# Server
server.port=${PORT:8080}

# ============================================================
# H2 In-Memory Database (RAM-Based, Cloud Native)
# ============================================================
spring.datasource.url=jdbc:h2:mem:hoteldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# MySQL Database (UNCOMMENT below & comment H2 above for production)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/hotel_reservation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload (for room images)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.hotel.reservation=INFO

# ============================================================
# OAuth2 Authentication Configuration (Google & Apple)
# ============================================================
# Note: You MUST replace these placeholder values with actual 
# Client IDs and Client Secrets from Google Cloud Console
# and Apple Developer Portal for the login to function on a real server.
# Currently set to placeholders to allow the application to compile and run.
spring.security.oauth2.client.registration.google.client-id=placeholder-google-client-id
spring.security.oauth2.client.registration.google.client-secret=placeholder-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email

spring.security.oauth2.client.registration.apple.client-id=placeholder-apple-client-id
spring.security.oauth2.client.registration.apple.client-secret=placeholder-apple-client-secret
spring.security.oauth2.client.registration.apple.scope=name,email
spring.security.oauth2.client.registration.apple.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.apple.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.apple.authorization-uri=https://appleid.apple.com/auth/authorize
spring.security.oauth2.client.provider.apple.token-uri=https://appleid.apple.com/auth/token
spring.security.oauth2.client.provider.apple.jwk-set-uri=https://appleid.apple.com/auth/keys
spring.security.oauth2.client.provider.apple.user-name-attribute=sub
