<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Booking History')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: messages}"></div>

<section class="page-header">
    <div class="container">
        <h1>My Bookings</h1>
        <p>View your reservation history</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div th:if="${!bookings.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Room</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Guests</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}">
                            <td th:text="${booking.id}">#1</td>
                            <td th:text="'Room ' + ${booking.room.roomNumber}">Room 101</td>
                            <td th:text="${#temporals.format(booking.checkInDate, 'dd MMM yyyy')}">01 Jan</td>
                            <td th:text="${#temporals.format(booking.checkOutDate, 'dd MMM yyyy')}">05 Jan</td>
                            <td th:text="${booking.guests}">2</td>
                            <td>₹<span th:text="${booking.totalPrice}">20000</span></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${booking.status.name() == 'PENDING'} ? 'badge-pending' :
                                                       (${booking.status.name() == 'CONFIRMED'} ? 'badge-confirmed' :
                                                       (${booking.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-completed'))"
                                      th:text="${booking.status.displayName}">Status</span>
                            </td>
                            <td>
                                <form th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post"
                                      th:if="${booking.status.name() == 'PENDING' || booking.status.name() == 'CONFIRMED'}"
                                      onsubmit="return confirm('Are you sure you want to cancel this booking?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Cancel</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:if="${bookings.isEmpty()}" class="text-center py-5">
            <i class="bi bi-journal-x" style="font-size: 3rem; color: #ccc;"></i>
            <h4 class="mt-3">No bookings yet</h4>
            <p class="text-muted">Start by browsing our rooms and making your first reservation.</p>
            <a th:href="@{/rooms}" class="btn btn-gold-custom">Browse Rooms</a>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
