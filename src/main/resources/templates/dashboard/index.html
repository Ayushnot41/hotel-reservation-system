<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: messages}"></div>

<section class="section-padding">
    <div class="container">
        <div class="welcome-card">
            <h2>Welcome back, <span th:text="${user.name}">User</span>! 👋</h2>
            <p class="mb-0">Manage your reservations and explore new rooms.</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card gold">
                    <div class="stat-number" th:text="${bookings.size()}">0</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4 text-center">
                    <i class="bi bi-person-circle" style="font-size: 2rem; color: #1B3A5C;"></i>
                    <h5 class="mt-2" th:text="${user.name}">Name</h5>
                    <p class="text-muted small mb-0" th:text="${user.email}">email</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card-custom p-4 text-center">
                    <i class="bi bi-calendar-check" style="font-size: 2rem; color: #D4AF37;"></i>
                    <h5 class="mt-2">Quick Actions</h5>
                    <a th:href="@{/rooms}" class="btn btn-gold-custom btn-sm mt-1">Browse Rooms</a>
                </div>
            </div>
        </div>

        <h3 class="mb-3">Recent Bookings</h3>
        <div th:if="${!bookings.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr><th>#</th><th>Room</th><th>Check-in</th><th>Check-out</th><th>Total</th><th>Status</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${bookings}" th:if="${bookingStat.index < 5}">
                            <td th:text="${booking.id}">#1</td>
                            <td th:text="'Room ' + ${booking.room.roomNumber}">Room 101</td>
                            <td th:text="${#temporals.format(booking.checkInDate, 'dd MMM yyyy')}">01 Jan</td>
                            <td th:text="${#temporals.format(booking.checkOutDate, 'dd MMM yyyy')}">05 Jan</td>
                            <td>₹<span th:text="${booking.totalPrice}">20000</span></td>
                            <td><span class="badge"
                                      th:classappend="${booking.status.name() == 'PENDING'} ? 'badge-pending' :
                                                       (${booking.status.name() == 'CONFIRMED'} ? 'badge-confirmed' :
                                                       (${booking.status.name() == 'CANCELLED'} ? 'badge-cancelled' : 'badge-completed'))"
                                      th:text="${booking.status.displayName}">Status</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <a th:href="@{/bookings/history}" class="btn btn-outline-gold btn-sm">View All Bookings</a>
        </div>
        <div th:if="${bookings.isEmpty()}" class="text-center py-4">
            <p class="text-muted">No bookings yet. <a th:href="@{/rooms}">Browse rooms</a> to get started!</p>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
