<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Guests')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-header">
    <div class="container">
        <h1>Registered Guests</h1>
        <p>All registered users</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="table-responsive">
            <table class="table table-custom">
                <thead>
                    <tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Registered</th></tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.name}">Name</td>
                        <td th:text="${user.email}">Email</td>
                        <td th:text="${user.phone ?: 'N/A'}">Phone</td>
                        <td><span class="badge" th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-danger' : 'bg-primary'" th:text="${user.role.name()}">USER</span></td>
                        <td th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">Date</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-gold mt-3"><i class="bi bi-arrow-left me-1"></i> Back to Dashboard</a>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
