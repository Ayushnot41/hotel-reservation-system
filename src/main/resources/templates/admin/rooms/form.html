<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Room Form')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="page-header">
    <div class="container">
        <h1 th:text="${room.id != null} ? 'Edit Room' : 'Add New Room'">Room Form</h1>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-custom p-4">
                    <form th:action="@{/admin/rooms/save}" th:object="${room}" method="post" class="needs-validation" novalidate>
                        <input type="hidden" th:field="*{id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Room Number *</label>
                                <input type="text" class="form-control" th:field="*{roomNumber}" required>
                                <div class="invalid-feedback">Room number is required</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Room Type *</label>
                                <select class="form-select" th:field="*{roomType}" required>
                                    <option value="">Select Type</option>
                                    <option th:each="type : ${roomTypes}" th:value="${type}" th:text="${type.displayName}">Type</option>
                                </select>
                                <div class="invalid-feedback">Please select room type</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Price per Night (₹) *</label>
                                <input type="number" class="form-control" th:field="*{pricePerNight}" step="0.01" min="1" required>
                                <div class="invalid-feedback">Price is required</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Capacity (Guests) *</label>
                                <input type="number" class="form-control" th:field="*{capacity}" min="1" max="10" required>
                                <div class="invalid-feedback">Capacity is required</div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Room description..."></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Image URL</label>
                                <input type="url" class="form-control" th:field="*{imageUrl}" placeholder="https://...">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Amenities (comma separated)</label>
                                <input type="text" class="form-control" th:field="*{amenities}" placeholder="Wi-Fi, TV, AC, Mini Bar">
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-2">
                                    <input type="checkbox" class="form-check-input" th:field="*{available}" id="available">
                                    <label class="form-check-label" for="available">Available for Booking</label>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-3">
                            <a th:href="@{/admin/rooms}" class="btn btn-outline-gold">Cancel</a>
                            <button type="submit" class="btn btn-gold-custom flex-grow-1">
                                <i class="bi bi-check-lg me-1"></i> Save Room
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
