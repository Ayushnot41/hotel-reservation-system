<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Rooms')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div th:replace="~{fragments/layout :: messages}"></div>

<section class="page-header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1>Room Management</h1>
            <p>Add, edit, and manage hotel rooms</p>
        </div>
        <a th:href="@{/admin/rooms/new}" class="btn btn-gold-custom">
            <i class="bi bi-plus-lg me-1"></i> Add Room
        </a>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="table-responsive" th:if="${!rooms.isEmpty()}">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th>Room #</th><th>Type</th><th>Price/Night</th><th>Capacity</th><th>Available</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="room : ${rooms}">
                        <td th:text="${room.roomNumber}">101</td>
                        <td><span class="room-type-badge" th:text="${room.roomType.displayName}">Suite</span></td>
                        <td>₹<span th:text="${room.pricePerNight}">5000</span></td>
                        <td th:text="${room.capacity}">2</td>
                        <td>
                            <i class="bi bi-check-circle-fill text-success" th:if="${room.available}"></i>
                            <i class="bi bi-x-circle-fill text-danger" th:unless="${room.available}"></i>
                        </td>
                        <td>
                            <a th:href="@{/admin/rooms/{id}/edit(id=${room.id})}" class="btn btn-sm btn-primary-custom me-1">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <a th:href="@{/admin/rooms/{id}/delete(id=${room.id})}" class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Are you sure you want to delete this room?')">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${rooms.isEmpty()}" class="text-center py-5">
            <p class="text-muted">No rooms found. <a th:href="@{/admin/rooms/new}">Add a room</a> to get started.</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-gold mt-3"><i class="bi bi-arrow-left me-1"></i> Back to Dashboard</a>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
